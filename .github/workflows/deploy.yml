name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare publish folder
        # On ne publie QUE les fichiers web-facing. Le reste (scripts/, docs, sources
        # photos, workflow CI) reste dans le repo mais n'est pas exposé en ligne.
        run: |
          mkdir -p _site/photos
          cp index.html mentions.html styles.css script.js og-image.jpg _site/
          cp photos/*.jpg photos/*.webp _site/photos/
          # Sanity check : on s'assure que rien d'indésirable n'a fuité
          echo "Fichiers publiés :"
          find _site -type f | sort

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
